name: Build

on:
  release:
    types: [created]
    
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          - os: windows-latest
            target: x86_64-pc-windows-msvc

          - os: windows-latest
            target: aarch64-pc-windows-msvc

          - os: macos-latest
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: ubuntu-latest
            target: wasm32-unknown-emscripten

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build
      shell: bash
      run: |
        cargo build \
          --release \
          --target ${{ matrix.target }}
        mkdir artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.target }}
        path: |
          target/${{ matrix.target }}/release/*
          cmake/Include/Naga.h

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download builds
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Assemble release
      shell: bash
      run: |
        mkdir release
        mkdir release/Include
        cp cmake/Naga.h release/Include/
        cp cmake/CMakeLists.txt release/
        for target in artifacts/*; do
          target_name=$(basename "$target")
          mkdir -p release/$target_name
            if [[ "$target_name" == *windows-msvc* ]]; then
          cp artifacts/"$target_name"/target/"$target_name"/release/naga_c.lib release/$target_name/Naga.lib
        else
          cp artifacts/"$target_name"/target/"$target_name"/release/libnaga_c.a release/$target_name/Naga.a
        fi
        done

    - name: Create archive
      run: |
        cd release
        zip -r ../NagaC.zip .
        cd ..
    - name: Upload release
      uses: softprops/action-gh-release@v2
      with:
        files: NagaC.zip
